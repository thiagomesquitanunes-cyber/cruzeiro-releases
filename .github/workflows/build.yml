name: Build & Publish Cruzeiro

on:
  push:
    tags:
      - 'v*'          # Triggered by any tag like v4.0.16
  workflow_dispatch:  # Manual trigger from GitHub UI

permissions:
  contents: write     # Required to create GitHub Releases

jobs:
  # ── Windows build (runs on Windows runner) ──────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & publish Windows
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run publish:win

  # ── macOS build (runs on macOS runner) ──────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & publish macOS (x64 + arm64)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Code signing disabled — users can still open via right-click → Open
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run publish:mac
